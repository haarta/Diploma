services:
  auth-db:
    image: postgres:16
    container_name: diploma_auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - diploma_auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auth_user -d auth_db" ]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: diploma_auth
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8081:8081"

  patient-db:
    image: postgres:16
    container_name: diploma_patient_db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: ${PATIENT_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - diploma_patient_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U patient_user -d patient_db" ]
      interval: 5s
      timeout: 3s
      retries: 20



  patient-service:
    build:
      context: .
      dockerfile: services/patient-service/Dockerfile
    container_name: diploma_patient
    depends_on:
      patient-db:
        condition: service_healthy
    environment:
      DB_HOST: patient-db
      DB_PORT: 5432
      DB_NAME: patient_db
      DB_USER: patient_user
      DB_PASSWORD: ${PATIENT_DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
    ports:
      - "8082:8082"

  appointment-db:
    image: postgres:16
    container_name: diploma_appointment_db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: ${APPOINTMENT_DB_PASSWORD:-appointment_password}
    ports:
      - "5435:5432"
    volumes:
      - diploma_appointment_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U appointment_user -d appointment_db" ]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.9.0
    container_name: diploma_kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
    ports:
      - "9092:9092"

  minio:
    image: minio/minio:latest
    container_name: diploma_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - diploma_minio_data:/data

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    container_name: diploma_appointment
    depends_on:
      appointment-db:
        condition: service_healthy
      kafka:
        condition: service_started
      minio:
        condition: service_started
    environment:
      DB_HOST: appointment-db
      DB_PORT: 5432
      DB_NAME: appointment_db
      DB_USER: appointment_user
      DB_PASSWORD: ${APPOINTMENT_DB_PASSWORD:-appointment_password}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_READ: ${MINIO_PUBLIC_READ}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-notification-service}
    ports:
      - "8083:8083"

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: diploma_notification
    depends_on:
      kafka:
        condition: service_started
    environment:
      MAIL_PROVIDER: ${MAIL_PROVIDER:-}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_FROM: ${MAIL_FROM:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-true}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-true}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      KAFKA_CONSUMER_GROUP: ${KAFKA_CONSUMER_GROUP:-notification-service}
    ports:
      - "8084:8084"

  frontend:
    build: ./medical-frontend
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - patient-service
      - appointment-service
      - notification-service

volumes:
  diploma_auth_pgdata:
  diploma_patient_pgdata:
  diploma_appointment_pgdata:
  diploma_minio_data:
