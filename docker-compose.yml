services:
  auth-db:
    image: postgres:16
    container_name: diploma_auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - diploma_auth_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U auth_user -d auth_db" ]
      interval: 5s
      timeout: 3s
      retries: 20

  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: diploma_auth
    depends_on:
      auth-db:
        condition: service_healthy
    environment:
      DB_HOST: auth-db
      DB_PORT: 5432
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: ${AUTH_DB_PASSWORD}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8081:8081"

  patient-db:
    image: postgres:16
    container_name: diploma_patient_db
    environment:
      POSTGRES_DB: patient_db
      POSTGRES_USER: patient_user
      POSTGRES_PASSWORD: ${PATIENT_DB_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - diploma_patient_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U patient_user -d patient_db" ]
      interval: 5s
      timeout: 3s
      retries: 20



  patient-service:
    build:
      context: .
      dockerfile: services/patient-service/Dockerfile
    container_name: diploma_patient
    depends_on:
      patient-db:
        condition: service_healthy
    environment:
      DB_HOST: patient-db
      DB_PORT: 5432
      DB_NAME: patient_db
      DB_USER: patient_user
      DB_PASSWORD: ${PATIENT_DB_PASSWORD}
    ports:
      - "8082:8082"

  appointment-db:
    image: postgres:16
    container_name: diploma_appointment_db
    environment:
      POSTGRES_DB: appointment_db
      POSTGRES_USER: appointment_user
      POSTGRES_PASSWORD: ${APPOINTMENT_DB_PASSWORD:-appointment_password}
    ports:
      - "5435:5432"
    volumes:
      - diploma_appointment_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U appointment_user -d appointment_db" ]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    container_name: diploma_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - diploma_minio_data:/data

  appointment-service:
    build:
      context: .
      dockerfile: services/appointment-service/Dockerfile
    container_name: diploma_appointment
    depends_on:
      appointment-db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      DB_HOST: appointment-db
      DB_PORT: 5432
      DB_NAME: appointment_db
      DB_USER: appointment_user
      DB_PASSWORD: ${APPOINTMENT_DB_PASSWORD:-appointment_password}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_PUBLIC_READ: ${MINIO_PUBLIC_READ}
    ports:
      - "8083:8083"

  frontend:
    build: ./medical-frontend
    ports:
      - "5173:5173"
    depends_on:
      - auth-service
      - patient-service
      - appointment-service

volumes:
  diploma_auth_pgdata:
  diploma_patient_pgdata:
  diploma_appointment_pgdata:
  diploma_minio_data:
